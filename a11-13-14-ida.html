var state={cur:0,answered:[],scores:[],okCount:0,errCount:0};

function startQuiz(){
  var name=document.getElementById('introName').value;
  if(!name){alert('Lütfen adınızı seçin.');return;}
  document.getElementById('resName').value=name;
  document.getElementById('resName2').value=name;
  document.getElementById('introScreen').style.display='none';
  document.getElementById('quizScreen').style.display='block';
  renderQ();
}

function syncResName(){
  document.getElementById('resName').value=document.getElementById('resName2').value;
}

function esc(s){
  if(!s)return'';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

function renderQ(){
  var i=state.cur;var q=Q[i];var html='';
  html+='<span class="q-badge">ÇOKTAN SEÇMELİ</span>';
  html+='<div class="q-text">'+esc(q.q)+'</div>';
  html+='<div class="opts">';
  var L=['A','B','C','D'];
  for(var j=0;j<q.o.length;j++){
    var cls='opt-btn';var dis='';var ans=state.answered[i];
    if(ans!==undefined){
      dis='disabled';
      if(j===q.a)cls+=' correct';
      else if(j===ans&&ans!==q.a)cls+=' wrong';
    }
    html+='<button class="'+cls+'" '+dis+' onclick="checkAns('+j+')"><strong>'+L[j]+')</strong> '+esc(q.o[j])+'</button>';
  }
  html+='</div>';
  html+='<div class="exp-box'+(state.answered[i]!==undefined?' show':'')+'" id="expBox">'+esc(q.exp)+'</div>';
  document.getElementById('qCard').innerHTML=html;
  var done=state.answered[i]!==undefined;
  document.getElementById('btnBack').disabled=(i===0||!done);
  document.getElementById('btnNext').disabled=(!done||i===Q.length-1);
  document.getElementById('btnSkip').disabled=(!done||i>=Q.length-1);
  document.getElementById('qMeta').textContent='Soru '+(i+1)+' / '+Q.length;
  document.getElementById('progFill').style.width=((i+1)/Q.length*100)+'%';
  document.getElementById('cntOk').textContent=state.okCount+' Doğru';
  document.getElementById('cntErr').textContent=state.errCount+' Yanlış';
}

function checkAns(j){
  var i=state.cur;
  if(state.answered[i]!==undefined)return;
  var q=Q[i];state.answered[i]=j;
  if(j===q.a){state.okCount++;state.scores[i]=1;}
  else{state.errCount++;state.scores[i]=0;}
  renderQ();
}

function goNext(){if(state.cur<Q.length-1){state.cur++;renderQ();}}
function goBack(){if(state.cur>0){state.cur--;renderQ();}}
function skipQ(){if(state.cur<Q.length-1){state.cur++;renderQ();}}

function confirmFinish(){
  var answered=0;for(var i=0;i<Q.length;i++){if(state.answered[i]!==undefined)answered++;}
  var unanswered=Q.length-answered;
  var msg='Toplam '+Q.length+' sorudan '+answered+' tanesini cevapladınız.';
  if(unanswered>0)msg+='\n\n'+unanswered+' soru cevapsız kalacak (0 puan).';
  msg+='\n\nTesti bitirmek istediğinize emin misiniz?';
  document.getElementById('confirmMsg').textContent=msg;
  document.getElementById('confirmOverlay').style.display='flex';
}
function closeConfirm(){document.getElementById('confirmOverlay').style.display='none';}
function doFinish(){closeConfirm();showResult();}

function showResult(){
  document.getElementById('quizScreen').style.display='none';
  document.getElementById('resultScreen').style.display='block';
  var total=0;for(var i=0;i<Q.length;i++){total+=(state.scores[i]||0);}
  var pct=total*2;if(pct>100)pct=100;
  document.getElementById('resScore').textContent=pct;
  document.getElementById('resOk').textContent=state.okCount+' Doğru';
  document.getElementById('resErr').textContent=state.errCount+' Yanlış';
  document.getElementById('resNote').textContent='50 sorudan '+state.okCount+' tanesi doğru (her soru 2 puan)';
  var rev=document.getElementById('reviewList');
  var L=['A','B','C','D'];var html2='';
  for(var i=0;i<Q.length;i++){
    var ans=state.answered[i];
    if(ans===undefined||ans===Q[i].a)continue;
    var q=Q[i];
    html2+='<div class="rev-item">';
    html2+='<div class="rev-q">'+esc(q.q)+'</div>';
    html2+='<div class="rev-chosen">Verdiğiniz cevap: '+L[ans]+') '+esc(q.o[ans])+'</div>';
    html2+='<div class="rev-correct">Doğru cevap: '+L[q.a]+') '+esc(q.o[q.a])+'</div>';
    html2+='<div class="rev-exp">'+esc(q.exp)+'</div>';
    html2+='</div>';
  }
  rev.innerHTML=html2||'<div style="padding:.5rem;color:#666">Yanlış soru bulunamadı.</div>';
}

function toggleReview(){
  var rv=document.getElementById('reviewList');
  rv.style.display=(rv.style.display==='flex'?'none':'flex');
}

function submitResult(){
  var name=document.getElementById('resName').value;
  if(!name){alert('L\u00fctfen ad\u0131n\u0131z\u0131 se\u00e7in.');return;}
  var total=0;for(var i=0;i<Q.length;i++){total+=(state.scores[i]||0);}
  var pct=total*2;if(pct>100)pct=100;
  var grup=GROUPS[name]||'A1.1';
  var payload=JSON.stringify({
    ogrenci:name,odev:ODEV_ADI,grup:grup,
    puan:pct,dogru:state.okCount,yanlis:state.errCount,
    tarih:new Date().toLocaleDateString('tr-TR')
  });
  document.getElementById('submitWarning').style.display='none';
  document.getElementById('submitMsg').style.display='block';
  document.getElementById('submitMsg').style.background='#fff3cd';
  document.getElementById('submitMsg').style.color='#856404';
  document.getElementById('submitMsg').style.border='1px solid #ffc107';
  document.getElementById('submitMsg').textContent='G\u00f6nderiliyor... (Grup: '+grup+')';
  document.getElementById('btnSubmit').disabled=true;
  var msgEl=document.getElementById('submitMsg');
  document.getElementById('debugPanel').style.display='block';
  document.getElementById('debugPanel').textContent='PAYLOAD: '+payload;

  fetch(SCRIPT_URL,{
    method:'POST',
    mode:'no-cors',
    headers:{'Content-Type':'text/plain'},
    body:payload
  })
  .then(function(){
    msgEl.style.background='#e6f9f0';
    msgEl.style.color='#1a5c3a';
    msgEl.style.border='1px solid #b8f0d8';
    msgEl.textContent=name+' \u00f6\u011frencisinin "\u201c'+ODEV_ADI+'\u201d \u00f6devi teslim edildi. Puan: '+pct+'/100.';
  })
  .catch(function(err){
    msgEl.style.background='#fde8e8';
    msgEl.style.color='#8b1a1a';
    msgEl.style.border='1px solid #d94040';
    msgEl.textContent='HATA: '+err.message+' | Payload: '+payload;
    document.getElementById('btnSubmit').disabled=false;
  });
}
</script>
</body>
</html>
